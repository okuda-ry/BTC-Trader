<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Auto Trader</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>Crypto Auto Trader</h1>
    <div class="controls">
      <label class="switch">
        <input type="checkbox" id="dryRunToggle" checked>
        <span class="slider"></span>
      </label>
      <span id="modeLabel">Dry Run</span>
      <button id="startBtn" class="btn btn-start">▶ 開始</button>
      <button id="stopBtn" class="btn btn-stop" disabled>■ 停止</button>
      <span id="statusBadge" class="badge badge-stopped">停止中</span>
    </div>
  </header>

  <main>
    <!-- 通貨タブ -->
    <nav class="currency-tabs" id="currencyTabs">
      {% for symbol, cfg in currencies.items() %}
      <button class="tab {% if loop.first %}active{% endif %}" data-symbol="{{ symbol }}">
        <span class="tab-symbol">{{ symbol }}</span>
        <span class="tab-price" id="tabPrice_{{ symbol }}">---</span>
        <span class="tab-position" id="tabPos_{{ symbol }}"></span>
      </button>
      {% endfor %}
    </nav>

    <!-- 選択中の通貨の詳細 -->
    <div id="currencyDetail">
      <section class="cards">
        <div class="card">
          <div class="card-label" id="priceLabel">価格</div>
          <div class="card-value" id="price">---</div>
        </div>
        <div class="card">
          <div class="card-label">RSI (14)</div>
          <div class="card-value" id="rsi">---</div>
        </div>
        <div class="card">
          <div class="card-label">MACD Histogram</div>
          <div class="card-value" id="macdH">---</div>
        </div>
        <div class="card">
          <div class="card-label">BB Position</div>
          <div class="card-value" id="bbPos">---</div>
        </div>
      </section>

      <!-- ポジション情報 -->
      <section class="position-box" id="positionBox">
        <span class="position-label">ポジション:</span>
        <span id="positionInfo">なし</span>
      </section>

      <!-- AI判断 -->
      <section class="decision-box">
        <h2>AI 判断</h2>
        <div class="decision-content">
          <span class="decision-action" id="decisionAction">---</span>
          <span class="decision-confidence" id="decisionConfidence"></span>
          <p class="decision-reason" id="decisionReason"></p>
        </div>
      </section>

      <div class="bottom-panels">
        <section class="panel">
          <h2>取引履歴</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>時刻</th><th>売買</th><th>数量</th><th>価格</th><th>理由</th></tr>
              </thead>
              <tbody id="tradeHistory"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>ログ</h2>
          <div class="log-area" id="logArea"></div>
        </section>
      </div>
    </div>
  </main>

  <script>
    let activeSymbol = '{{ currencies.keys()|first }}';

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const dryRunToggle = document.getElementById('dryRunToggle');
    const modeLabel = document.getElementById('modeLabel');
    const statusBadge = document.getElementById('statusBadge');

    // タブ切り替え
    document.getElementById('currencyTabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeSymbol = tab.dataset.symbol;
    });

    dryRunToggle.addEventListener('change', () => {
      modeLabel.textContent = dryRunToggle.checked ? 'Dry Run' : 'LIVE';
      modeLabel.style.color = dryRunToggle.checked ? '' : '#e74c3c';
    });

    startBtn.addEventListener('click', async () => {
      const dryRun = dryRunToggle.checked;
      if (!dryRun && !confirm('⚠️ LIVEモードで開始します。実際に注文が実行されます。よろしいですか？')) return;
      await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dry_run: dryRun }),
      });
    });

    stopBtn.addEventListener('click', async () => {
      await fetch('/api/stop', { method: 'POST' });
    });

    function updateUI(data) {
      // ボタン状態
      startBtn.disabled = data.running;
      stopBtn.disabled = !data.running;
      dryRunToggle.disabled = data.running;
      if (data.running) {
        statusBadge.textContent = data.dry_run ? '稼働中 (Dry Run)' : '稼働中 (LIVE)';
        statusBadge.className = 'badge ' + (data.dry_run ? 'badge-dry' : 'badge-live');
      } else {
        statusBadge.textContent = '停止中';
        statusBadge.className = 'badge badge-stopped';
      }

      const currencies = data.currencies || {};

      // タブの価格・ポジション更新
      for (const [sym, info] of Object.entries(currencies)) {
        const priceEl = document.getElementById('tabPrice_' + sym);
        const posEl = document.getElementById('tabPos_' + sym);
        if (priceEl && info.summary) {
          priceEl.textContent = '¥' + Math.round(info.summary.price).toLocaleString();
        }
        if (posEl) {
          if (info.entry_price) {
            posEl.textContent = '●';
            posEl.className = 'tab-position has-position';
          } else {
            posEl.textContent = '';
            posEl.className = 'tab-position';
          }
        }
      }

      // 選択中の通貨の詳細
      const cur = currencies[activeSymbol];
      if (!cur) return;

      document.getElementById('priceLabel').textContent = activeSymbol + '/JPY';

      if (cur.summary) {
        const s = cur.summary;
        document.getElementById('price').textContent = '¥' + Math.round(s.price).toLocaleString();
        const rsiEl = document.getElementById('rsi');
        rsiEl.textContent = s.rsi.toFixed(1);
        rsiEl.className = 'card-value' + (s.rsi < 30 ? ' text-green' : s.rsi > 70 ? ' text-red' : '');
        const macdEl = document.getElementById('macdH');
        macdEl.textContent = s.macd_histogram.toFixed(2);
        macdEl.className = 'card-value' + (s.macd_histogram > 0 ? ' text-green' : ' text-red');
        document.getElementById('bbPos').textContent = s.bb_position.toFixed(3);
      }

      // ポジション情報
      const posInfo = document.getElementById('positionInfo');
      if (cur.entry_price && cur.entry_size > 0) {
        const pnl = cur.summary ? ((cur.summary.price - cur.entry_price) / cur.entry_price * 100).toFixed(2) : '---';
        posInfo.innerHTML = `${cur.entry_size} ${activeSymbol} @ ¥${Math.round(cur.entry_price).toLocaleString()} <span class="${parseFloat(pnl) >= 0 ? 'text-green' : 'text-red'}">(${pnl}%)</span>`;
      } else {
        posInfo.textContent = 'なし';
      }

      // AI判断
      if (cur.decision) {
        const d = cur.decision;
        const actionEl = document.getElementById('decisionAction');
        actionEl.textContent = d.action;
        actionEl.className = 'decision-action action-' + d.action.toLowerCase();
        document.getElementById('decisionConfidence').textContent = '確信度: ' + (d.confidence * 100).toFixed(0) + '%';
        document.getElementById('decisionReason').textContent = d.reason;
      } else {
        document.getElementById('decisionAction').textContent = '---';
        document.getElementById('decisionConfidence').textContent = '';
        document.getElementById('decisionReason').textContent = '';
      }

      // 取引履歴
      const history = cur.trade_history || [];
      document.getElementById('tradeHistory').innerHTML = history.slice().reverse().map(t =>
        `<tr class="trade-${t.action.toLowerCase()}">
          <td>${t.time}</td>
          <td><strong>${t.action}</strong></td>
          <td>${t.size}</td>
          <td>¥${t.price.toLocaleString()}</td>
          <td>${t.reason}</td>
        </tr>`
      ).join('');

      // ログ
      const logArea = document.getElementById('logArea');
      const wasAtBottom = logArea.scrollTop + logArea.clientHeight >= logArea.scrollHeight - 20;
      logArea.innerHTML = data.logs.map(l =>
        `<div class="log-line log-${l.level.toLowerCase()}"><span class="log-time">${l.time}</span> ${l.message}</div>`
      ).join('');
      if (wasAtBottom) logArea.scrollTop = logArea.scrollHeight;
    }

    async function poll() {
      try {
        const resp = await fetch('/api/status');
        if (resp.ok) updateUI(await resp.json());
      } catch (e) { /* ignore */ }
    }

    setInterval(poll, 3000);
    poll();
  </script>
</body>
</html>
